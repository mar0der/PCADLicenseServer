name: CD

on:
  workflow_dispatch:
    inputs:
      git_ref:
        description: Git ref to deploy for rollback or targeted redeploy
        required: false
        type: string
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: pcad-production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on:
      - self-hosted
      - Linux
      - the18th
      - pcad
    timeout-minutes: 45
    environment:
      name: production
      url: https://pcad.petarpetkov.com
    env:
      SITE_SLUG: pcad
      DOMAIN: pcad.petarpetkov.com
      SERVER_PATH: /opt/pcad/site
      COMPOSE_FILE: docker-compose.server.yml
      ENV_FILE: .env.server
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.git_ref || github.sha }}

      - name: Verify deploy target exists
        run: test -f /opt/pcad/site/.env.server

      - name: Show deploy ref
        run: git rev-parse HEAD

      - name: Deploy
        run: bash scripts/deploy_pcad.sh
