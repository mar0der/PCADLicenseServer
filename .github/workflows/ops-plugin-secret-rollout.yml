name: Ops Plugin Secret Rollout

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  rotate-and-restart:
    runs-on:
      - self-hosted
      - Linux
      - the18th
      - pcad
    timeout-minutes: 30
    env:
      ROLLOUT_PLUGIN_SECRET: ${{ secrets.PCAD_ROLLOUT_PLUGIN_SECRET }}
      SERVER_PATH: /opt/pcad/site
      COMPOSE_FILE: docker-compose.server.yml
      ENV_FILE: .env.server
      SITE_SLUG: pcad
      SMOKE_USER: dokaflex-rollout-smoke
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate temporary secret exists
        run: |
          if [ -z "${ROLLOUT_PLUGIN_SECRET}" ]; then
            echo "Missing repo secret PCAD_ROLLOUT_PLUGIN_SECRET" >&2
            exit 1
          fi
          echo "::add-mask::${ROLLOUT_PLUGIN_SECRET}"

      - name: Update host .env.server
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import os

          env_path = Path("/opt/pcad/site/.env.server")
          secret = os.environ["ROLLOUT_PLUGIN_SECRET"]
          lines = env_path.read_text().splitlines()
          replaced = False
          updated = []
          for line in lines:
              if line.startswith("PLUGIN_SECRET="):
                  updated.append(f"PLUGIN_SECRET={secret}")
                  replaced = True
              else:
                  updated.append(line)

          if not replaced:
              updated.append(f"PLUGIN_SECRET={secret}")

          env_path.write_text("\n".join(updated) + "\n")
          PY
          grep '^PLUGIN_SECRET=' /opt/pcad/site/.env.server | sed 's/=.*/=[REDACTED]/'

      - name: Restart production container
        run: |
          cd "${SERVER_PATH}"
          export APP_BUILD_SHA="manual-plugin-secret-rotate-$(date -u +%Y%m%d%H%M%S)"
          export APP_BUILD_TIME_UTC="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          docker compose -p "${SITE_SLUG}" -f "${COMPOSE_FILE}" --env-file "${ENV_FILE}" up -d --build
          docker compose -p "${SITE_SLUG}" -f "${COMPOSE_FILE}" --env-file "${ENV_FILE}" ps

      - name: Wait for readiness
        run: |
          cd "${SERVER_PATH}"
          ready=0
          for _ in $(seq 1 30); do
            if docker compose -p "${SITE_SLUG}" -f "${COMPOSE_FILE}" --env-file "${ENV_FILE}" exec -T web \
              node -e 'fetch("http://127.0.0.1:3000/api/readiness").then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))'
            then
              ready=1
              break
            fi
            sleep 2
          done

          if [ "${ready}" -ne 1 ]; then
            docker compose -p "${SITE_SLUG}" -f "${COMPOSE_FILE}" --env-file "${ENV_FILE}" logs --tail 100 web || true
            exit 1
          fi

      - name: Ensure smoke user exists
        run: |
          cd "${SERVER_PATH}"
          docker compose -p "${SITE_SLUG}" -f "${COMPOSE_FILE}" --env-file "${ENV_FILE}" exec -T web \
            node - <<'NODE'
            const { PrismaClient } = require("@prisma/client");
            const prisma = new PrismaClient();

            (async () => {
              const user = await prisma.user.upsert({
                where: { username: process.env.SMOKE_USER },
                update: {
                  isActive: true,
                  baseRole: "BOSS",
                  accessLevel: 3,
                },
                create: {
                  username: process.env.SMOKE_USER,
                  isActive: true,
                  baseRole: "BOSS",
                  accessLevel: 3,
                },
              });

              const [commandCount, tabCount, panelCount, itemCount] = await Promise.all([
                prisma.command.count({ where: { pluginSlug: "dokaflex" } }),
                prisma.ribbonTab.count({ where: { pluginSlug: "dokaflex" } }),
                prisma.ribbonPanel.count({ where: { pluginSlug: "dokaflex" } }),
                prisma.ribbonItem.count({ where: { pluginSlug: "dokaflex" } }),
              ]);

              console.log(JSON.stringify({
                smokeUser: user.username,
                commandCount,
                tabCount,
                panelCount,
                itemCount,
              }));
            })().catch((error) => {
              console.error(error);
              process.exit(1);
            }).finally(async () => {
              await prisma.$disconnect();
            });
            NODE
