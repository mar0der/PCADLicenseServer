services:
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: pcad_web
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      PLUGIN_SECRET: ${PLUGIN_SECRET}
      ADMIN_USERNAME: ${ADMIN_USERNAME}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      ACCESS_SNAPSHOT_PRIVATE_KEY_PATH: /run/pcad-secrets/access-snapshot.private.pem
      APP_BUILD_SHA: ${APP_BUILD_SHA:-}
      APP_BUILD_TIME_UTC: ${APP_BUILD_TIME_UTC:-}
    volumes:
      - pcad_data:/app/data
      - ${ACCESS_SNAPSHOT_PRIVATE_KEY_HOST_PATH}:/run/pcad-secrets/access-snapshot.private.pem:ro
    networks:
      web_network:
        aliases:
          - pcad-web
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - fetch("http://127.0.0.1:3000/api/readiness").then((response)=>process.exit(response.ok?0:1)).catch(()=>process.exit(1))
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  pcad_data:

networks:
  web_network:
    external: true
    name: web_network
